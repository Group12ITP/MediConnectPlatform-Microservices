apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: backend-api-gateway
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service:5006
        - name: TELEMEDICINE_SERVICE_URL
          value: http://telemedicine-service:5007
        - name: SYMPTOM_CHECKER_URL
          value: http://ai-symptom-checker-service:5008
        - name: USER_SERVICE_URL
          value: http://user-service:5001
        - name: APPOINTMENT_SERVICE_URL
          value: http://appointment-service:5002
        - name: CONSULTATION_SERVICE_URL
          value: http://consultation-service:5003
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service:5004
        - name: PHARMACY_SERVICE_URL
          value: http://pharmacy-service:5005
        envFrom:
        - configMapRef:
            name: mediconnect-env
        - secretRef:
            name: mediconnect-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 5000
    targetPort: 5000
